<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>

  <style>
    body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    color: #000;
    gap: 20px;
    margin-top: 50px;
    transition: 0.3s;
}

.container {
    width: 400px;
    background: white;
    padding: 20px;
    margin: 50px auto;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,.2);
    transition: 0.3s;
}

.s{
    /* margin: 50px auto; */
}

h2 {
    text-align: center;
}

.edit-input{
    width: 100%;
    padding: 5px;
    font-size: 16px;
}

.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    transition: 0.3s;
}

button {
    padding: 10px 15px;
    cursor: pointer;
    transition: 0.3s;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #eee;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 5px;
    transition: 0.3s;
}

li.completed span {
    text-decoration: line-through;
    color: gray;
}

.actions button {
    margin-left: 5px;
}

/* ---------- Dark Mode ---------- */

body.dark-mode {
    background: #121212;
    color: #fff;
}

body.dark-mode .container {
    background: #1f1f1f;
    box-shadow: 0 0 10px rgba(255,255,255,.1);
}

body.dark-mode input,
body.dark-mode .edit-input {
    background: #2d2d2d;
    color: #fff;
    border: 1px solid #555;
}

body.dark-mode li {
    background: #2d2d2d;
}

body.dark-mode button {
    background: #444;
    color: #fff;
    border: 1px solid #666;
}

body.dark-mode li.completed span {
    color: #aaa;
}
  </style>
</head>
<body>
<button id="themeToggle">🌙 Dark Mode</button>
  <div class="container s">
    <p>translate</p>
    <label for="name">name</label>
    <input type="text" id="name" />
  </div><br><br>
<div class="container">
  <h2>Todo App</h2>

  <div class="input-box">
    <input type="text" id="todoInput" placeholder="Enter task">
    <button onclick="addTodo()">Add</button>
  </div>

  <ul id="todoList"></ul>
</div>

<script>


/* ===========================
   Local Storage + Theme
=========================== */

let todos = JSON.parse(localStorage.getItem("todos")) || [];

const todoInput = document.getElementById("todoInput");
const todoList = document.getElementById("todoList");
const themeToggle = document.getElementById("themeToggle");

/* ===========================
   Save Todos
=========================== */

function saveTodos() {
    localStorage.setItem("todos", JSON.stringify(todos));
}

/* ===========================
   Save Theme
=========================== */

function saveTheme() {
    const mode = document.body.classList.contains("dark-mode")
        ? "dark"
        : "light";

    localStorage.setItem("theme", mode);
}

/* ===========================
   Load Theme
=========================== */

function loadTheme() {

    const theme = localStorage.getItem("theme");

    if (theme === "dark") {

        document.body.classList.add("dark-mode");

        themeToggle.innerText = "☀️ Light Mode";

    } else {

        document.body.classList.remove("dark-mode");

        themeToggle.innerText = "🌙 Dark Mode";
    }
}

/* ===========================
   Render Todos
=========================== */

function renderTodos() {

    todoList.innerHTML = "";

    todos.forEach((todo, index) => {

        const li = document.createElement("li");

        if (todo.completed) {
            li.classList.add("completed");
        }

        li.innerHTML = `

        <span>${todo.text}</span>

        <div class="actions">

            <button onclick="toggleTask(${index})">
                ✔
            </button>

            <button onclick="editTask(${index})">
                ✏️
            </button>

            <button onclick="deleteTask(${index})">
                🗑️
            </button>

        </div>

        `;

        todoList.appendChild(li);

    });

}

/* ===========================
   Add Todo
=========================== */

function addTodo() {

    const task = todoInput.value.trim();

    if (task === "") return;

    todos.push({

        text: task,

        completed: false

    });

    saveTodos();

    renderTodos();

    todoInput.value = "";

}

/* ===========================
   Enter Key
=========================== */

todoInput.addEventListener("keypress", function (e) {

    if (e.key === "Enter") {

        addTodo();

    }

});
  function addTodo() {
    const put=document.getElementById("todoInput");
    const task=put.value.trim();
    if(task==="") return;
    const li=document.createElement("li");
    li.innerHTML = `
  <span>${task}</span>

  <div class="actions">
    <button onclick="toggleTask(this)">✔</button>
    <button onclick="editTask(this)">✏️</button>
    <button onclick="deleteTask(this)">🗑️</button>
  </div>
`;
    document.getElementById("todoList").appendChild(li);
    put.value = "";
  }

  function deleteTask(btn) {
    btn.closest("li").remove();
  }

  function toggleTask(btn) {
    btn.closest("li").classList.toggle("completed");
  }

 function editTask(btn) {
    const li = btn.closest("li");
    const span = li.querySelector("span");

    // Prevent multiple edits
    if (li.querySelector(".edit-input")) return;

    const input = document.createElement("input");
    input.type = "text";
    input.value = span.innerText;
    input.className = "edit-input";

    const saveBtn = document.createElement("button");
    saveBtn.innerText = "Save";

    span.replaceWith(input);
    btn.replaceWith(saveBtn);

    input.focus();

    saveBtn.addEventListener("click", function () {
        const newSpan = document.createElement("span");
        newSpan.innerText = input.value.trim() || "Untitled Task";

        input.replaceWith(newSpan);

        const editBtn = document.createElement("button");
        editBtn.innerText = "✏️";
        editBtn.onclick = function () {
            editTask(editBtn);
        };

        saveBtn.replaceWith(editBtn);
    });
}

  const put=document.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
      addTodo();
    }
  });

  const toggleBtn = document.getElementById("themeToggle");

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        toggleBtn.innerText = "☀️ Light Mode";
    }else{
        toggleBtn.innerText = "🌙 Dark Mode";
    }
});
</script>

</body>
</html>
